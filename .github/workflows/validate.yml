name: Validate compose

on:
  push:
    branches:
      - main
      - staging
      - develop
  pull_request:
    branches:
      - main
      - staging
      - develop
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate YAML syntax
        run: |
          python3 -c "import yaml; yaml.safe_load(open('docker-compose.yml'))"
      - name: Create env files from templates
        # Only the .env.*.example templates are tracked; the real files are
        # gitignored. `docker compose config` resolves every `env_file:` target
        # on disk, so recreate them exactly as the README's setup step does —
        # which also keeps CI honest about the documented path working.
        run: |
          for f in .env .env.api .env.db .env.ui; do
            cp "$f.example" "$f"
          done
      - name: Validate compose spec
        run: docker compose config --quiet
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
          STELLAR_AUTH_JWT_SECRET: ci-placeholder-pad-to-32-chars-ok
          STELLAR_HTTP_CORS_ORIGIN: http://localhost:3000
