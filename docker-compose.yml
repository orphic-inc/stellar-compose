version: "3.9"
services:
  api:
    # Pin a published semver, not :latest (ADR-0027). Bump this to promote a
    # release; roll back by reverting the pin. To build locally instead,
    # comment `image:` and uncomment `build:`.
    image: ghcr.io/orphic-inc/stellar-api:0.7.0
    # build: ./api
    restart: always
    env_file:
      - .env.api
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
  ui:
    # Pinned to the latest published stellar-ui image (version parity with
    # the api, per ADR-0027).
    image: ghcr.io/orphic-inc/stellar-ui:0.6.9
    # build: ./ui
    restart: always
    env_file:
      - .env.ui
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    networks:
      - internal
      - public
    volumes:
      - ./dhparam:/etc/nginx/dhparam:ro,Z
      - ./volumes/proxy-certs:/etc/nginx/certs:ro,Z
      - ./proxy.nginx.conf:/etc/nginx/nginx.conf:ro,Z
      # - ./proxy-tls.nginx.conf:/etc/nginx/nginx.conf:ro,Z
  db:
    image: postgres:18-alpine
    restart: always
    env_file:
      - .env.db
    networks:
      - internal
    # 18+ images expect a single mount at /var/lib/postgresql (not .../data)
    # and place data in a major-version-specific subdirectory themselves; see
    # https://github.com/docker-library/postgres/pull/1259. Mounting at
    # .../data directly makes the entrypoint refuse to start.
    volumes:
      - ./volumes/db-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
networks:
  public:
  internal:
