version: "3.9"
services:
  api:
    # Pin a published semver, not :latest (ADR-0027). Bump this to promote a
    # release; roll back by reverting the pin. To build locally instead,
    # comment `image:` and uncomment `build:`.
    image: ghcr.io/orphic-inc/stellar-api:0.6.9
    # build: ./api
    restart: always
    env_file:
      - .env.api
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
  ui:
    # 0.6.3 is the latest published stellar-ui image; bump to 0.6.9 once the
    # ui release cut catches up to the api (version parity). See ADR-0027.
    image: ghcr.io/orphic-inc/stellar-ui:0.6.3
    # build: ./ui
    restart: always
    env_file:
      - .env.ui
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    networks:
      - internal
      - public
    volumes:
      - ./dhparam:/etc/nginx/dhparam:ro,Z
      - ./volumes/proxy-certs:/etc/nginx/certs:ro,Z
      - ./proxy.nginx.conf:/etc/nginx/nginx.conf:ro,Z
      # - ./proxy-tls.nginx.conf:/etc/nginx/nginx.conf:ro,Z
  db:
    # Pinned — the `-alpine` suffix floats the distro, the same drift class that
    # broke the api Prisma engine (ADR-0001). 16.9 is the current postgres 16
    # patch; bump deliberately via a reviewed PR, never back to a floating tag.
    image: postgres:16.9-alpine3.22
    restart: always
    env_file:
      - .env.db
    networks:
      - internal
    volumes:
      - ./volumes/db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
networks:
  public:
  internal:
